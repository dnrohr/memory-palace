name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Local gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verify
        run: npm run verify
